<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body style="background-image: linear-gradient(30deg,);">
     <div class="container vh-100 d-flex justify-content-center align-items-center">
        <form class="card rounded-5 p-4 shadow bg-dark" style="width: 350px;">
            
            <h4 class="text-center mb-3 text-light">Calculator</h4>

            <input type="number" class="form-control mb-3" placeholder="Enter number 1" id="num1">

            <input type="number" class="form-control mb-3" placeholder="Enter number 2" id="num2">

            <select id="abc" class="form-select mb-3">
                <option value="">Select option</option>
                <option value="add">Addition</option>
                <option value="mul">Multiplication</option>
                <option value="div">Division</option>
            </select>

            <button type="button" onclick="cal()" class="btn btn-primary w-100">
                Submit
            </button>

        </form>
    </div>
<script>
    function cal(){
            var a = Number(document.getElementById("num1").value);
            var b = Number(document.getElementById("num2").value);
            var c = document.getElementById("xyz").value;

             if (c === "add") {
                ab = a + b;
                document.write("Addition:");
            } else if (c === "mul") {
                ab = a * b;
                document.write("Multiplication:");
            } else if (c === "div") {
                ab = a / b;
                document.write("Division:");
            } else {
                ab = "invalid";
            }
            document.write(ab);
    }
</script>
</body>
</html>
