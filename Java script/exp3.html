<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <input type="number" placeholder="No. Of Units" id="unit"><br><br>
         <input type="number" placeholder="Per unit charges" id="charges"><br><br>

         <button type="button" onclick="mul()">Submit</button>
    </form>
    <script>
        function mul(){
            var u=document.getElementById("unit").value;
             var c=document.getElementById("charges").value;
             
             var totalamount=u*c;

             document.write("NO.Of Units: "+u+"<br>");
             document.write("Per Units  Charges:"+c+"<br>");
             document.write("total amount:"+totalamount);
        }
    </script>
</body>
</html>
